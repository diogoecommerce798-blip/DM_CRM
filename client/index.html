  <body>
    <div id="root"></div>

    <script>
      (function() {
        const endpoint = "%VITE_ANALYTICS_ENDPOINT%";
        const websiteId = "%VITE_ANALYTICS_WEBSITE_ID%";
        // Only inject if both variables are defined and not the placeholder strings
        if (endpoint && websiteId && !endpoint.startsWith('%') && !websiteId.startsWith('%')) {
          const script = document.createElement('script');
          script.defer = true;
          script.type = 'module';
          script.src = endpoint + '/umami';
          script.setAttribute('data-website-id', websiteId);
          document.head.appendChild(script);
        }
      })();
    </script>
